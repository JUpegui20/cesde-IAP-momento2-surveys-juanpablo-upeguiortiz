<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Página de presentación del sistema de encuestas</title>

    <link rel="stylesheet" href="styles/style.css">
</head>
<!-- examen-html-css-2026 -->

<body class="body-survey">

    <!-- Pregunta 1 -->
    <section class="question">
        <p>¿Cuál es el objetivo principal de la Retrospectiva en Scrum?</p>

        <form>
            <input type="radio" id="p1_1" name="pregunta1">
            <label for="p1_1">
                Identificar qué funcionó, qué no y definir mejoras para el siguiente sprint.
            </label><br>

            <input type="radio" id="p1_2" name="pregunta1">
            <label for="p1_2">
                Aprobar el presupuesto del proyecto para el próximo trimestre.
            </label><br>

            <input type="radio" id="p1_3" name="pregunta1">
            <label for="p1_3">
                Asignar tareas individuales y medir quién trabajó más.
            </label>
        </form>
    </section>

    <!-- Pregunta 2 -->
    <section class="question">
        <p>En Scrum, ¿quién es responsable de priorizar el Product Backlog?</p>

        <form>
            <input type="radio" id="p2_1" name="pregunta2">
            <label for="p2_1">El Scrum Master</label><br>

            <input type="radio" id="p2_2" name="pregunta2">
            <label for="p2_2">El equipo de desarrollo</label><br>

            <input type="radio" id="p2_3" name="pregunta2">
            <label for="p2_3">El Product Owner</label>
        </form>
    </section>

    <!-- Pregunta 3 -->
    <section class="question">
        <p>En Kanban, ¿para qué sirven los límites de WIP (Work In Progress)??</p>

        <form>
            <input type="radio" id="p3_1" name="pregunta3">
            <label for="p2_1">Para definir la duración exacta de un sprint. </label><br>

            <input type="radio" id="p3_2" name="pregunt32">
            <label for="p2_2">Para limitar el trabajo en curso y mejorar el flujo/tiempo de entrega. </label><br>

            <input type="radio" id="p3_3" name="pregunta3">
            <label for="p2_3">Para aumentar la cantidad de tareas iniciadas al mismo tiempo. </label>
        </form>
    </section>

    <!-- Pregunta 4 -->
    <section class="question">
        <p>En Kanban, ¿para qué sirven los límites de WIP (Work In Progress)??</p>

        <form>
            <input type="radio" id="p4_1" name="pregunta3">
            <label for="p2_1">Una lista completa de casos de prueba con todos los pasos y evidencias.  </label><br>

            <input type="radio" id="p4_2" name="pregunt32">
            <label for="p2_2">Un documento técnico detallado con diagramas de arquitectura y clases.</label><br>

            <input type="radio" id="p4_3" name="pregunta3">
            <label for="p2_3">Una necesidad del usuario expresada de forma simple, enfocada en el valor (Ej: “Como…, quiero…, para…”). </label>
        </form>
    </section>

        <header class="header-Survey ">
        <form action="contact-us.html">
            

            <input type="submit" value="Enviar">
        </form>
    <br>
    <br>
    <br>
    </header>

</body>

</html>
